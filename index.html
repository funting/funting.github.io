<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=en/index.html">
<title>Ting Huang 黃婷</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    animation: none;
  }
  .chooser { text-align: center; padding: 2rem; }
  .chooser-mark {
    width: 3px;
    height: 34px;
    margin: 0 auto 1.2rem;
    background: linear-gradient(180deg, var(--color-accent), var(--color-gold));
    border-radius: 2px;
  }
  .chooser h1 { margin-bottom: .5rem; }
  .chooser p { color: var(--color-muted); margin-bottom: 2.2rem; font-style: italic; }
  .chooser-links { display: flex; gap: 1rem; justify-content: center; }
  .chooser-links a {
    padding: .75rem 2rem;
    border: 1.5px solid var(--color-accent);
    border-radius: 999px;
    color: var(--color-accent);
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 1.05rem;
    transition: all .18s ease;
  }
  .chooser-links a:hover {
    background: var(--color-accent);
    color: #fff;
    text-decoration: none;
    box-shadow: 0 6px 16px rgba(122, 31, 43, .25);
    transform: translateY(-1px);
  }
</style>
<script>window.location.replace("en/index.html");</script>
</head>
<body>
  <div class="chooser">
    <div class="chooser-mark"></div>
    <h1>Ting Huang 黃婷</h1>
    <p>Assistant Professor, Department of Foreign Languages, National Chiayi University</p>
    <div class="chooser-links">
      <a href="en/index.html">English</a>
      <a href="zh/index.html">中文</a>
    </div>
  </div>
</body>
</html>
